name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test with coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      # Dogfood gate: PRISM audits itself, and holds itself to a high bar — a
      # tool that audits quality shouldn't pass itself at a mediocre 6/10.
      # analyze exits non-zero below --min-score, and --fail-on/--max-* enforce
      # hard security gates so a single new critical can't hide behind a good
      # average. The JUnit sidecar surfaces findings in the CI UI.
      - name: Self-audit (dogfood gate)
        run: >-
          node dist/cli/index.js analyze .
          --min-score 8.5
          --fail-on critical
          --max-high 0
          --junit prism-junit.xml
